name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build on CI, deploy artifacts to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm ci
          npm run build

      - name: Assemble standalone package
        run: |
          cp -r .next/static .next/standalone/.next/static
          npm install --cpu=x64 --os=linux --libc=glibc sharp
          cp -r node_modules/sharp .next/standalone/node_modules/
          cp -r node_modules/@img .next/standalone/node_modules/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Seed shared public directory
        run: |
          rsync -az --ignore-existing \
            -e "ssh -i ~/.ssh/deploy_key" \
            public/ ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/home/jolovic/shared/public/

      - name: Rsync standalone package to server
        run: |
          rsync -az --delete --exclude=/public \
            -e "ssh -i ~/.ssh/deploy_key" \
            .next/standalone/ ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/home/jolovic/jolovic_me/

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            mkdir -p /home/jolovic/shared/public
            rm -rf /home/jolovic/jolovic_me/public
            ln -sfn /home/jolovic/shared/public /home/jolovic/jolovic_me/public
            pm2 delete jolovic_me 2>/dev/null || true
            fuser -k 3000/tcp 2>/dev/null || true
            pm2 start /home/jolovic/jolovic_me/server.js --name jolovic_me
            pm2 save

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            sleep 3
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000)
            if [ "$STATUS" != "200" ]; then
              echo "Health check failed: HTTP $STATUS"
              exit 1
            fi
            echo "Health check passed: HTTP $STATUS"
