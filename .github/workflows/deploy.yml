name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build on CI, deploy artifacts to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Rsync build artifacts to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -az --delete
          path: .next/ public/ package.json package-lock.json
          remote_path: /home/jolovic/jolovic_me/
          remote_host: ${{ secrets.DROPLET_HOST }}
          remote_user: ${{ secrets.DROPLET_USER }}
          remote_key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Install prod deps and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/jolovic_me
            npm install --omit=dev
            pm2 restart jolovic_me || pm2 start npm --name jolovic_me -- start -- -p 3000
            pm2 save
