name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build on CI, deploy artifacts to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync build artifacts to server
        run: |
          rsync -az --delete .next public package.json package-lock.json \
            -e "ssh -i ~/.ssh/deploy_key" \
            ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }}:/home/jolovic/jolovic_me/

      - name: Install prod deps and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/jolovic_me
            npm install --omit=dev
            pm2 restart jolovic_me || pm2 start npm --name jolovic_me -- start -- -p 3000
            pm2 save
